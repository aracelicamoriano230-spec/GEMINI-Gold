name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Restore Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          tr -d '\r\n' < debug.keystore.base64 | base64 -d > debug.keystore || tr -d '\r\n' < debug.keystore.base64 | base64 --decode > debug.keystore
        else
          echo "debug.keystore.base64 not found, generating a new debug keystore as fallback"
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Fix Line Endings and Permissions
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --no-configuration-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
